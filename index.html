<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#4f46e5" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="description" content="LinguaLearn — Interactive English learning platform for Vietnamese learners" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <title>LinguaLearn — Learn English</title>
    <style>
      #app-splash {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 18px;
        background: linear-gradient(160deg, #f8fafc 0%, #eef2ff 55%, #ecfeff 100%);
        transition: opacity 0.45s ease, visibility 0.45s ease;
        font-family: 'Inter', system-ui, -apple-system, sans-serif;
      }

      #app-splash.app-splash-hidden {
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
      }

      .app-splash-logo {
        width: 76px;
        height: 76px;
        border-radius: 22px;
        background: linear-gradient(135deg, #4f46e5 0%, #06b6d4 100%);
        display: flex;
        align-items: center;
        justify-content: center;
        color: #fff;
        font-weight: 800;
        font-size: 2.1rem;
        letter-spacing: -0.03em;
        box-shadow: 0 14px 34px rgba(79, 70, 229, 0.28), 0 4px 14px rgba(6, 182, 212, 0.2);
        animation: appSplashPop 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) both;
      }

      .app-splash-name {
        font-weight: 800;
        font-size: 1.4rem;
        color: #1e293b;
        letter-spacing: -0.02em;
        animation: appSplashFadeUp 0.55s ease 0.1s both;
      }

      .app-splash-tagline {
        font-size: 0.85rem;
        color: #64748b;
        margin-top: -10px;
        animation: appSplashFadeUp 0.55s ease 0.18s both;
      }

      .app-splash-dots {
        display: flex;
        gap: 7px;
        margin-top: 4px;
      }

      .app-splash-dots span {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: linear-gradient(135deg, #4f46e5, #06b6d4);
        animation: appSplashBounce 1.1s ease-in-out infinite;
      }

      .app-splash-dots span:nth-child(2) { animation-delay: 0.15s; }
      .app-splash-dots span:nth-child(3) { animation-delay: 0.3s; }

      @keyframes appSplashPop {
        0% { transform: scale(0.6); opacity: 0; }
        100% { transform: scale(1); opacity: 1; }
      }

      @keyframes appSplashFadeUp {
        0% { transform: translateY(8px); opacity: 0; }
        100% { transform: translateY(0); opacity: 1; }
      }

      @keyframes appSplashBounce {
        0%, 80%, 100% { transform: translateY(0); opacity: 0.5; }
        40% { transform: translateY(-8px); opacity: 1; }
      }

      @media (prefers-reduced-motion: reduce) {
        .app-splash-logo,
        .app-splash-name,
        .app-splash-tagline,
        .app-splash-dots span {
          animation: none !important;
        }
      }
    </style>
  </head>
  <body>
    <div id="app-splash" role="status" aria-live="polite" aria-label="Loading LinguaLearn">
      <div class="app-splash-logo">L</div>
      <div class="app-splash-name">LinguaLearn</div>
      <div class="app-splash-tagline">Học tiếng Anh mỗi ngày</div>
      <div class="app-splash-dots"><span></span><span></span><span></span></div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
